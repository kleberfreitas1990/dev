<!-- templates/apoiadores.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Apoiadores</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="apoiadores-container">
            <div class="apoiadores-header">
                <h2>
                    👑 Apoiadores
                    <span class="total">{{ apoiadores|length }}</span>
                </h2>
            </div>

            {% if apoiadores %}
            <div class="badges-grid">
                {% for a in apoiadores %}
                <div class="badge-tag" style="background: {{ a.cor or '#4ECDC4' }}">
                    <span class="icone">{{ a.coroinha or '👑' }}</span>
                    {{ a.nome }}
                    <span class="numero">#{{ a.ordem }}</span>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <p>😢 Nenhum apoiador ainda. Seja o primeiro!</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
