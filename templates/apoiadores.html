<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Apoiadores</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .page-apoiadores {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .apoiadores-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .apoiadores-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .apoiadores-header h1 {
            font-size: 24px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .apoiadores-header .total {
            background: #4ECDC4;
            color: white;
            font-size: 14px;
            border-radius: 50px;
            padding: 4px 16px;
            font-weight: 600;
        }
        .badges-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .badge {
            background: #4ECDC4;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(78, 205, 196, 0.3);
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            cursor: default;
            white-space: nowrap;
        }
        .badge:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(78, 205, 196, 0.5);
        }
        .badge .icone {
            font-size: 16px;
        }
        .badge .numero {
            font-size: 12px;
            opacity: 0.8;
            margin-left: 4px;
        }
        .sem-apoiadores {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 16px;
        }
        @media (max-width: 600px) {
            .apoiadores-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .badges-grid {
                gap: 8px;
            }
            .badge {
                padding: 6px 14px;
                font-size: 13px;
                gap: 6px;
            }
            .badge .icone {
                font-size: 13px;
            }
            .badge .numero {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    {% include 'includes/header.html' %}

    <div class="page-apoiadores">
        <div class="apoiadores-container">
            <div class="apoiadores-header">
                <h1>
                    👑 Apoiadores
                    <span class="total">{{ apoiadores|length }}</span>
                </h1>
            </div>

            {% if apoiadores %}
            <div class="badges-grid">
                {% for a in apoiadores %}
                <div class="badge">
                    <span class="icone">👑</span>
                    {{ a.nome }}
                    <span class="numero">{{ a.numero }}</span>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <div class="sem-apoiadores">
                😢 Nenhum apoiador ainda. Seja o primeiro!
            </div>
            {% endif %}
        </div>
    </div>

    {% include 'includes/footer.html' %}
</body>
</html>
