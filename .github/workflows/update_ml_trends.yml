name: Update ML Trends

on:
  schedule:
    - cron: '0 */12 * * *' # Executa a cada 12 horas
  workflow_dispatch: # Permite execução manual

jobs:
  update-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permite que o bot faça push de volta ao repositório
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run ML Trends script (legacy)
        run: python atualizar_ml_trends.py

      - name: Run ML Real-Time Scraper (v9.3)
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from modules.mercadolivre_scraper import forcar_atualizacao_ml
          result = forcar_atualizacao_ml()
          print(f'ML Scraper: {len(result)} produtos capturados')
          "

      - name: Run Shopee Scraping script
        run: python scraping_shopee_v2.py

      - name: Run Amazon Scraping script
        run: python scraping_amazon.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add modules/produtos_dinamicos.py modules/mercadolivre_scraper.py modules/google_shopee_trends.py ml_trends_cache.json shopee_trends.json amazon_trends.json shopee_live_cache.json
          git commit -m "auto: v9.8 — Atualização Multi-Fonte (ML + Shopee + Amazon)" || exit 0
          git push
