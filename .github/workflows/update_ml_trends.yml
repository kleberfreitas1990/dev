name: Update Marketplace Trends

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 selenium

      - name: Install Chrome for Shopee collection
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Refresh official Mercado Livre and Amazon sources
        run: |
          python - <<'PY'
          from modules.amazon_scraper import capturar_bestsellers_amazon
          from modules.mercadolivre_scraper import forcar_atualizacao_ml

          mercado_livre = forcar_atualizacao_ml()
          amazon = capturar_bestsellers_amazon(forcar=True)

          if not mercado_livre:
              raise SystemExit("Nenhuma tendência oficial do Mercado Livre foi confirmada.")
          if not amazon:
              raise SystemExit("Nenhum Best Seller oficial da Amazon foi confirmado nem existe cache oficial válido.")

          print(f"Mercado Livre oficial: {len(mercado_livre)} termos")
          print(f"Amazon oficial ou último cache validado: {len(amazon)} produtos")
          PY

      - name: Refresh Shopee source
        run: python scraping_shopee_v2.py

      - name: Verify source provenance
        run: |
          python - <<'PY'
          import json

          expected = {
              "ml_trends_cache.json": "https://tendencias.mercadolivre.com.br/",
              "amazon_trends.json": "https://www.amazon.com.br/gp/bestsellers/",
          }

          for path, source_url in expected.items():
              with open(path, encoding="utf-8") as file:
                  payload = json.load(file)
              assert payload.get("url_fonte") == source_url, f"Fonte inválida em {path}"
              assert payload.get("origem_coleta") == "pagina_oficial", f"Origem inválida em {path}"
              assert payload.get("status_coleta") == "sucesso", f"Status inválido em {path}"
              assert isinstance(payload.get("produtos"), dict) and payload["produtos"], f"Sem produtos em {path}"
          PY
          test -s shopee_trends.json

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .github/workflows/update_ml_trends.yml atualizar_ml_trends.py scraping_amazon.py modules/mercadolivre_scraper.py modules/amazon_scraper.py modules/produtos_dinamicos.py modules/grade_descoberta.py ml_trends_cache.json shopee_trends.json amazon_trends.json
          git commit -m "fix: valida fontes oficiais e categorias da grade" || exit 0
          git push
