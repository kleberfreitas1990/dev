name: Update ML Trends

on:
  schedule:
    - cron: '0 */12 * * *' # Executa a cada 12 horas
  workflow_dispatch: # Permite execução manual

jobs:
  update-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permite que o bot faça push de volta ao repositório
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run ML Trends script
        run: python atualizar_ml_trends.py

      - name: Run Shopee Scraping script
        run: python scraping_shopee_v2.py

      - name: Run Amazon Scraping script
        run: python scraping_amazon.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add modules/produtos_dinamicos.py shopee_trends.json amazon_trends.json modules/grade_descoberta.py
          git commit -m "auto: Atualização automática Shopee + ML + Amazon Trends" || exit 0
          git push
